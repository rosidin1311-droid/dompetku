<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E87E96"/>
      <stop offset="55%" stop-color="#DB627A"/>
      <stop offset="100%" stop-color="#A6415A"/>
    </linearGradient>

    <linearGradient id="bevelTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="walletBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4A6B60"/>
      <stop offset="45%" stop-color="#354E47"/>
      <stop offset="100%" stop-color="#1F2D28"/>
    </linearGradient>

    <linearGradient id="walletFlap" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F3E3C7"/>
      <stop offset="55%" stop-color="#E9D4AE"/>
      <stop offset="100%" stop-color="#C9A876"/>
    </linearGradient>

    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF3D6"/>
      <stop offset="50%" stop-color="#E8C878"/>
      <stop offset="100%" stop-color="#B5883C"/>
    </linearGradient>

    <linearGradient id="ivoryStripe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFDF7"/>
      <stop offset="100%" stop-color="#FAF2E3"/>
    </linearGradient>

    <filter id="dropShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#5A1F30" flood-opacity="0.45"/>
    </filter>

    <filter id="softShadowSmall" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3A2410" flood-opacity="0.35"/>
    </filter>

    <radialGradient id="glossHighlight" cx="35%" cy="20%" r="70%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- App icon background -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGrad)"/>
  <rect x="16" y="16" width="480" height="480" rx="108" fill="none" stroke="#5A1F30" stroke-width="2" opacity="0.35"/>

  <!-- top inner bevel highlight -->
  <rect x="16" y="16" width="480" height="230" rx="108" fill="url(#bevelTop)"/>

  <!-- Wallet group, slightly rotated for dynamic 3D feel -->
  <g transform="translate(256 268) rotate(-6)" filter="url(#dropShadow)">

    <!-- wallet back body -->
    <rect x="-146" y="-98" width="292" height="196" rx="26" fill="#16211C"/>

    <!-- wallet main body -->
    <rect x="-140" y="-92" width="280" height="184" rx="24" fill="url(#walletBody)"/>

    <!-- side depth strip (right edge, 3D thickness) -->
    <path d="M 140 -92 L 156 -80 L 156 96 L 140 92 Z" fill="#12211B"/>
    <!-- bottom depth strip -->
    <path d="M -140 92 L -124 106 L 148 106 L 140 92 Z" fill="#1A2E26"/>

    <!-- flap -->
    <path d="M -140 -92 Q 0 -142 140 -92 L 140 -8 Q 0 -46 -140 -8 Z" fill="url(#walletFlap)"/>
    <path d="M -140 -92 Q 0 -142 140 -92 L 140 -78 Q 0 -128 -140 -78 Z" fill="#ffffff" opacity="0.25"/>

    <!-- ivory stripe accent under flap -->
    <rect x="-140" y="-6" width="280" height="18" fill="url(#ivoryStripe)" opacity="0.9"/>

    <!-- coin clasp -->
    <circle cx="0" cy="2" r="34" fill="url(#coinGrad)" filter="url(#softShadowSmall)"/>
    <circle cx="0" cy="2" r="34" fill="none" stroke="#8A6421" stroke-width="2" opacity="0.5"/>
    <text x="0" y="16" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="38" fill="#8A5A22" text-anchor="middle" opacity="0.85">D</text>

    <!-- gloss overlay across whole wallet -->
    <rect x="-146" y="-98" width="292" height="196" rx="26" fill="url(#glossHighlight)"/>
  </g>

  <!-- floating coin top-right for extra depth/parallax -->
  <g transform="translate(374 150) rotate(12)" filter="url(#softShadowSmall)">
    <circle cx="0" cy="0" r="26" fill="url(#coinGrad)"/>
    <circle cx="0" cy="0" r="26" fill="none" stroke="#8A6421" stroke-width="2" opacity="0.5"/>
    <text x="0" y="9" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="24" fill="#8A5A22" text-anchor="middle" opacity="0.85">Rp</text>
  </g>

  <!-- outer rim highlight for glassy app-icon feel -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#glossHighlight)" opacity="0.5"/>
</svg>
